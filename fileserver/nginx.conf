server {
    listen 8080;
    root /data/node_fills_by_block/hourly;

    # Browser-friendly HTML file listing (default)
    location / {
        autoindex on;
    }

    # Machine-readable JSON listing for programmatic access
    location /api/ {
        alias /data/node_fills_by_block/hourly/;
        autoindex on;
        autoindex_format json;
        default_type application/json;
    }
}
